<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">🏫 LMS — Teacher</div>
    <div class="user-info">
        <span>👋 <strong id="navUsername"></strong></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</nav>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="dashboard.html">🏠 <span>Dashboard</span></a>
        <a href="notes.html">📚 <span>Upload Notes</span></a>
        <a href="assignments.html">📝 <span>Assignments</span></a>
        <a href="notices.html">📢 <span>Post Notices</span></a>
        <a href="timetable.html" class="active">🕐 <span>Timetable</span></a>
    </div>

    <!-- MAIN -->
    <div class="main-content">
        <h1 class="page-title">🕐 Class Timetable</h1>
        <p class="page-subtitle">Manage the weekly class schedule</p>

        <!-- ADD PERIOD FORM -->
        <div class="card" style="max-width:650px; margin-bottom:28px;">
            <h2 style="font-size:16px; font-weight:600; margin-bottom:18px; color:#333;">
                ➕ Add New Period
            </h2>

            <div class="alert alert-error"   id="errorMsg"></div>
            <div class="alert alert-success" id="successMsg"></div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                <div class="form-group">
                    <label>Day</label>
                    <select id="day">
                        <option value="mon">Monday</option>
                        <option value="tue">Tuesday</option>
                        <option value="wed">Wednesday</option>
                        <option value="thu">Thursday</option>
                        <option value="fri">Friday</option>
                        <option value="sat">Saturday</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Period Number</label>
                    <input type="number" id="period" 
                        placeholder="e.g. 1" min="1" max="10">
                </div>

                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="subject" 
                        placeholder="e.g. Mathematics">
                </div>

                <div class="form-group">
                    <label>Teacher Name</label>
                    <input type="text" id="teacherName" 
                        placeholder="e.g. Mr. Kumar">
                </div>

                <div class="form-group">
                    <label>Start Time</label>
                    <input type="time" id="startTime">
                </div>

                <div class="form-group">
                    <label>End Time</label>
                    <input type="time" id="endTime">
                </div>
            </div>

            <button class="btn btn-primary" onclick="addPeriod()" id="addBtn">
                ➕ Add Period
            </button>
        </div>

        <!-- TIMETABLE VIEW -->
        <h2 style="font-size:17px; margin-bottom:14px; color:#333;">
            📅 Weekly Timetable
        </h2>

        <!-- DAY TABS -->
        <div style="display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;">
            <button class="filter-btn active-filter" onclick="showDay('all', this)">
                All Days
            </button>
            <button class="filter-btn" onclick="showDay('mon', this)">Mon</button>
            <button class="filter-btn" onclick="showDay('tue', this)">Tue</button>
            <button class="filter-btn" onclick="showDay('wed', this)">Wed</button>
            <button class="filter-btn" onclick="showDay('thu', this)">Thu</button>
            <button class="filter-btn" onclick="showDay('fri', this)">Fri</button>
            <button class="filter-btn" onclick="showDay('sat', this)">Sat</button>
        </div>

        <div id="timetableView">
            <div class="loading">Loading timetable...</div>
        </div>
    </div>
</div>

<style>
    .filter-btn {
        padding: 8px 18px;
        border: 2px solid #e0e0e0;
        border-radius: 20px;
        background: white;
        font-size: 13px;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #1a73e8; color: #1a73e8; }
    .active-filter    { background: #1a73e8 !important; color: white !important;
                        border-color: #1a73e8 !important; }

    .day-section { margin-bottom: 24px; }
    .day-title {
        font-size: 15px;
        font-weight: 700;
        color: #1a73e8;
        margin-bottom: 10px;
        padding: 6px 14px;
        background: #e8f0fe;
        border-radius: 8px;
        display: inline-block;
    }

    .period-row {
        display: grid;
        grid-template-columns: 60px 80px 1fr 1fr 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: white;
        border-radius: 10px;
        margin-bottom: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        font-size: 14px;
    }

    .period-num {
        background: #1a73e8;
        color: white;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 13px;
    }

    .time-badge {
        font-size: 12px;
        color: #666;
        background: #f0f2f5;
        padding: 4px 8px;
        border-radius: 6px;
        white-space: nowrap;
    }
</style>

<script>
    const API   = 'https://lms-backend-paui.onrender.com/api';
    const token = localStorage.getItem('access_token');
    const role  = localStorage.getItem('role');

    if (!token || role !== 'teacher') {
        window.location.href = '../index.html';
    }

    document.getElementById('navUsername').textContent = localStorage.getItem('username');

    const headers = { 'Authorization': `Bearer ${token}` };
    let allEntries = [];

    const DAY_NAMES = {
        mon: 'Monday', tue: 'Tuesday', wed: 'Wednesday',
        thu: 'Thursday', fri: 'Friday', sat: 'Saturday'
    };

    const DAY_ORDER = ['mon','tue','wed','thu','fri','sat'];

    // ── ADD PERIOD ──
    async function addPeriod() {
        const day         = document.getElementById('day').value;
        const period      = document.getElementById('period').value;
        const subject     = document.getElementById('subject').value.trim();
        const teacherName = document.getElementById('teacherName').value.trim();
        const startTime   = document.getElementById('startTime').value;
        const endTime     = document.getElementById('endTime').value;
        const btn         = document.getElementById('addBtn');

        if (!period)      { showError('Please enter period number'); return; }
        if (!subject)     { showError('Please enter subject'); return; }
        if (!teacherName) { showError('Please enter teacher name'); return; }
        if (!startTime)   { showError('Please select start time'); return; }
        if (!endTime)     { showError('Please select end time'); return; }
        if (startTime >= endTime) {
            showError('End time must be after start time'); return;
        }

        btn.textContent = '⏳ Adding...';
        btn.disabled = true;
        hideMessages();

        try {
            const res = await fetch(`${API}/timetable/`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    day,
                    period:       parseInt(period),
                    subject,
                    teacher_name: teacherName,
                    start_time:   startTime,
                    end_time:     endTime
                })
            });

            const data = await res.json();

            if (res.ok) {
                showSuccess('✅ Period added successfully!');
                // Clear form
                document.getElementById('period').value      = '';
                document.getElementById('subject').value     = '';
                document.getElementById('teacherName').value = '';
                document.getElementById('startTime').value   = '';
                document.getElementById('endTime').value     = '';
                loadTimetable();
            } else {
                // Handle unique constraint error
                if (JSON.stringify(data).includes('unique') ||
                    JSON.stringify(data).includes('already')) {
                    showError('This period already exists for that day! Delete it first.');
                } else {
                    showError('Failed to add period. Please try again.');
                }
            }

        } catch (err) {
            showError('Cannot connect to server.');
        } finally {
            btn.textContent = '➕ Add Period';
            btn.disabled = false;
        }
    }

    // ── LOAD TIMETABLE ──
    async function loadTimetable() {
        try {
            const res  = await fetch(`${API}/timetable/`, { headers });
            allEntries = await res.json();
            renderTimetable(allEntries);
        } catch (err) {
            document.getElementById('timetableView').innerHTML =
                '<p style="color:red;">Failed to load timetable.</p>';
        }
    }

    // ── SHOW BY DAY ──
    function showDay(day, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('active-filter');
        });
        btn.classList.add('active-filter');

        if (day === 'all') {
            renderTimetable(allEntries);
        } else {
            renderTimetable(allEntries.filter(e => e.day === day));
        }
    }

    // ── RENDER ──
    function renderTimetable(entries) {
        const container = document.getElementById('timetableView');

        if (entries.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <p>No periods added yet. Add your first period above!</p>
                </div>`;
            return;
        }

        // Group by day
        const grouped = {};
        DAY_ORDER.forEach(d => grouped[d] = []);
        entries.forEach(e => {
            if (grouped[e.day]) grouped[e.day].push(e);
        });

        let html = '';
        DAY_ORDER.forEach(day => {
            const periods = grouped[day];
            if (periods.length === 0) return;

            // Sort by period number
            periods.sort((a, b) => a.period - b.period);

            html += `
                <div class="day-section">
                    <div class="day-title">📅 ${DAY_NAMES[day]}</div>
                    ${periods.map(p => `
                        <div class="period-row" id="period-${p.id}">
                            <div class="period-num">P${p.period}</div>
                            <span class="time-badge">
                                ${formatTime(p.start_time)} - ${formatTime(p.end_time)}
                            </span>
                            <span style="font-weight:600;">${p.subject}</span>
                            <span style="color:#666;">👨‍🏫 ${p.teacher_name}</span>
                            <span></span>
                            <button class="btn btn-danger" 
                                onclick="deletePeriod(${p.id})">
                                🗑️
                            </button>
                        </div>
                    `).join('')}
                </div>`;
        });

        container.innerHTML = html;
    }

    // ── DELETE ──
    async function deletePeriod(id) {
        if (!confirm('Delete this period?')) return;
        try {
            const res = await fetch(`${API}/timetable/${id}/`, {
                method: 'DELETE', headers
            });
            if (res.ok) {
                document.getElementById(`period-${id}`).remove();
                allEntries = allEntries.filter(e => e.id !== id);
                showSuccess('🗑️ Period deleted!');
            }
        } catch (err) {
            showError('Failed to delete.');
        }
    }

    // ── HELPERS ──
    function formatTime(time) {
        const [h, m] = time.split(':');
        const hour   = parseInt(h);
        const ampm   = hour >= 12 ? 'PM' : 'AM';
        const hour12 = hour % 12 || 12;
        return `${hour12}:${m} ${ampm}`;
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('successMsg').style.display = 'none';
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMsg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('errorMsg').style.display = 'none';
    }

    function hideMessages() {
        document.getElementById('errorMsg').style.display   = 'none';
        document.getElementById('successMsg').style.display = 'none';
    }

    function logout() {
        localStorage.clear();
        window.location.href = '../index.html';
    }

    loadTimetable();
</script>

</body>
</html>
