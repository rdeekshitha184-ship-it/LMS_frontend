<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">🏫 LMS — Teacher</div>
    <div class="user-info">
        <span>👋 <strong id="navUsername"></strong></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</nav>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="dashboard.html">🏠 <span>Dashboard</span></a>
        <a href="notes.html">📚 <span>Upload Notes</span></a>
        <a href="assignments.html" class="active">📝 <span>Assignments</span></a>
        <a href="notices.html">📢 <span>Post Notices</span></a>
        <a href="timetable.html">🕐 <span>Timetable</span></a>
    </div>

    <!-- MAIN -->
    <div class="main-content">
        <h1 class="page-title">📝 Assignments</h1>
        <p class="page-subtitle">Create and manage assignments for students</p>

        <!-- CREATE FORM -->
        <div class="card" style="max-width:600px; margin-bottom:28px;">
            <h2 style="font-size:16px; font-weight:600; margin-bottom:18px; color:#333;">
                ➕ Create New Assignment
            </h2>

            <div class="alert alert-error"   id="errorMsg"></div>
            <div class="alert alert-success" id="successMsg"></div>

            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="subject" 
                    placeholder="e.g. Mathematics, CS101, Physics...">
            </div>

            <div class="form-group">
                <label>Assignment Title</label>
                <input type="text" id="title" 
                    placeholder="e.g. Unit 1 - Chapter 2 Exercise">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="3" 
                    placeholder="Describe what students need to do..."></textarea>
            </div>

            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="dueDate">
            </div>

            <div class="form-group">
                <label>Attachment (optional PDF)</label>
                <input type="file" id="assignFile" accept=".pdf">
            </div>

            <button class="btn btn-primary" onclick="createAssignment()" id="createBtn">
                📝 Create Assignment
            </button>
        </div>

        <!-- ASSIGNMENTS LIST -->
        <h2 style="font-size:17px; margin-bottom:14px; color:#333;">
            📋 All Assignments
        </h2>

        <!-- FILTER -->
        <input type="text" id="filterSubject" placeholder="🔍 Filter by subject..."
            oninput="filterAssignments()"
            style="padding:10px 16px; border-radius:8px; border:2px solid #e0e0e0;
                   font-size:14px; outline:none; width:300px; margin-bottom:16px;">

        <div id="assignmentsList">
            <div class="loading">Loading assignments...</div>
        </div>
    </div>
</div>

<script>
    const API   = 'https://lms-backend-paui.onrender.com/api';
    const token = localStorage.getItem('access_token');
    const role  = localStorage.getItem('role');

    if (!token || role !== 'teacher') {
        window.location.href = '../index.html';
    }

    document.getElementById('navUsername').textContent = localStorage.getItem('username');

    const headers = { 'Authorization': `Bearer ${token}` };
    let allAssignments = [];

    // Set minimum date to today
    document.getElementById('dueDate').min = new Date().toISOString().split('T')[0];

    // ── CREATE ASSIGNMENT ──
    async function createAssignment() {
        const subject     = document.getElementById('subject').value.trim();
        const title       = document.getElementById('title').value.trim();
        const description = document.getElementById('description').value.trim();
        const dueDate     = document.getElementById('dueDate').value;
        const fileInput   = document.getElementById('assignFile');
        const btn         = document.getElementById('createBtn');

        if (!subject)     { showError('Please enter a subject'); return; }
        if (!title)       { showError('Please enter a title'); return; }
        if (!description) { showError('Please enter a description'); return; }
        if (!dueDate)     { showError('Please select a due date'); return; }

        btn.textContent = '⏳ Creating...';
        btn.disabled = true;
        hideMessages();

        const formData = new FormData();
        formData.append('subject',     subject);
        formData.append('title',       title);
        formData.append('description', description);
        formData.append('due_date',    dueDate);
        if (fileInput.files[0]) {
            formData.append('file', fileInput.files[0]);
        }

        try {
            const res = await fetch(`${API}/assignments/`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });

            if (res.ok) {
                showSuccess('✅ Assignment created successfully!');
                document.getElementById('subject').value     = '';
                document.getElementById('title').value       = '';
                document.getElementById('description').value = '';
                document.getElementById('dueDate').value     = '';
                fileInput.value = '';
                loadAssignments();
            } else {
                showError('Failed to create assignment. Please try again.');
            }

        } catch (err) {
            showError('Cannot connect to server.');
        } finally {
            btn.textContent = '📝 Create Assignment';
            btn.disabled = false;
        }
    }

    // ── LOAD ASSIGNMENTS ──
    async function loadAssignments() {
        try {
            const res      = await fetch(`${API}/assignments/`, { headers });
            allAssignments = await res.json();
            renderAssignments(allAssignments);
        } catch (err) {
            document.getElementById('assignmentsList').innerHTML =
                '<p style="color:red;">Failed to load assignments.</p>';
        }
    }

    // ── FILTER ──
    function filterAssignments() {
        const query = document.getElementById('filterSubject').value.toLowerCase();
        if (query) {
            renderAssignments(allAssignments.filter(a =>
                a.subject.toLowerCase().includes(query)
            ));
        } else {
            renderAssignments(allAssignments);
        }
    }

    // ── RENDER ──
    function renderAssignments(assignments) {
        const container = document.getElementById('assignmentsList');
        if (assignments.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <p>No assignments yet. Create your first one above!</p>
                </div>`;
            return;
        }

        container.innerHTML = assignments.map(a => {
            const today   = new Date();
            const due     = new Date(a.due_date);
            const daysLeft = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
            const dueBadge = daysLeft < 0
                ? `<span style="color:#ea4335; font-weight:600;">⚠️ Overdue</span>`
                : daysLeft === 0
                ? `<span style="color:#fa7b17; font-weight:600;">⚠️ Due Today!</span>`
                : `<span style="color:#34a853; font-weight:600;">✅ ${daysLeft} days left</span>`;

            return `
            <div class="card" id="assign-${a.id}">
                <div class="card-header">
                    <div>
                        <span class="card-title">${a.title}</span>
                        <p class="card-meta" style="margin-top:4px;">${a.description}</p>
                    </div>
                    <span style="background:#e8f0fe; color:#1a73e8; padding:4px 12px;
                                 border-radius:20px; font-size:12px; font-weight:600;
                                 white-space:nowrap;">
                        ${a.subject}
                    </span>
                </div>

                <div style="display:flex; align-items:center;
                            justify-content:space-between; margin-top:12px;
                            flex-wrap:wrap; gap:8px;">
                    <div>
                        <p class="card-meta">
                            📅 Due: <strong>${a.due_date}</strong> • ${dueBadge}
                        </p>
                        <p class="card-meta">By ${a.created_by}</p>
                    </div>
                    <div style="display:flex; gap:8px;">
                        ${a.file ? `
                        <a href="${a.file}" target="_blank">
                            <button class="btn btn-success"
                                style="width:auto; padding:7px 14px; font-size:13px;">
                                📎 View File
                            </button>
                        </a>` : ''}
                        <button class="btn btn-danger"
                            onclick="deleteAssignment(${a.id})">
                            🗑️ Delete
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    // ── DELETE ──
    async function deleteAssignment(id) {
        if (!confirm('Delete this assignment?')) return;
        try {
            const res = await fetch(`${API}/assignments/${id}/`, {
                method: 'DELETE', headers
            });
            if (res.ok) {
                document.getElementById(`assign-${id}`).remove();
                allAssignments = allAssignments.filter(a => a.id !== id);
                showSuccess('🗑️ Assignment deleted!');
            }
        } catch (err) {
            showError('Failed to delete.');
        }
    }

    // ── HELPERS ──
    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('successMsg').style.display = 'none';
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMsg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('errorMsg').style.display = 'none';
    }

    function hideMessages() {
        document.getElementById('errorMsg').style.display   = 'none';
        document.getElementById('successMsg').style.display = 'none';
    }

    function logout() {
        localStorage.clear();
        window.location.href = '../index.html';
    }

    loadAssignments();
</script>
<div class="bottom-nav">
    <a href="dashboard.html">
        <span class="nav-icon">🏠</span>
        <span>Home</span>
    </a>
    <a href="notes.html">
        <span class="nav-icon">📚</span>
        <span>Notes</span>
    </a>
    <a href="assignments.html" class="active">
        <span class="nav-icon">📝</span>
        <span>Tasks</span>
    </a>
    <a href="notices.html">
        <span class="nav-icon">📢</span>
        <span>Notices</span>
    </a>
    <a href="timetable.html">
        <span class="nav-icon">🕐</span>
        <span>Time</span>
    </a>
</div>
</body>
</html>
